name: Monitor Flight Prices

on:
  schedule:
    - cron: '0 */6 * * *' # Roda a cada 6 horas
  workflow_dispatch: # Permite rodar manualmente pelo site do GitHub
    inputs:
      data_ida:
        description: 'Data de ida (YYYY-MM-DD)'
        required: false
        default: '2027-02-15'
      data_volta:
        description: 'Data de volta (YYYY-MM-DD)'
        required: false
        default: '2027-02-27'

permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Google Chrome
        run: |
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraping Script
        env:
          DATA_IDA: ${{ github.event.inputs.data_ida }}
          DATA_VOLTA: ${{ github.event.inputs.data_volta }}
        run: python monitor.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: New flight prices [skip ci]" && git push)
